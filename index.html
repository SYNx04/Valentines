<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will You Be My Valentine, Paushali?</title>

<style>
@font-face {
  font-family: 'PinkRose';
  src: url('Pink Rose.ttf');
}
@font-face {
  font-family: 'Coolvetica';
  src: url('Coolvetica Rg.otf');
}

body {
  margin: 0;
  background: linear-gradient(180deg, #ffe6ef, #fff);
  font-family: Coolvetica, -apple-system, BlinkMacSystemFont,
               "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji", sans-serif;
  text-align: center;
  color: #333;
  overflow-x: hidden;
}

section {
  padding: 40px 20px;
}

h2 {
  font-family: PinkRose;
  font-size: 2.2rem;
  margin-bottom: 20px;
}

img {
  width: 90%;
  max-width: 350px;
  border-radius: 18px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

.caption {
  margin-top: 12px;
  font-size: 1.1rem;
}

/* Where it all started animation */
.fade-in {
  animation: fadeInUp 1.5s ease;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Carousel */
.carousel {
  position: relative;
  max-width: 320px;
  margin: auto;
}
.carousel img {
  position: absolute;
  top: 0;
  left: 0;
  opacity: 0;
  transition: opacity 1s ease;
}
.carousel img.active {
  opacity: 1;
  position: relative;
}

/* Proposal section */
.heart {
  font-size: 4rem;
  animation: pulse 1s infinite;
}
@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

button {
  font-size: 1.2rem;
  padding: 12px 22px;
  margin: 15px;
  border-radius: 30px;
  border: none;
  cursor: pointer;
}

#yesBtn {
  background: #ff5c8d;
  color: white;
}

#noBtn {
  background: #ddd;
  position: absolute;
}

#timer, #heartbeat {
  font-size: 1.1rem;
  margin-top: 10px;
}

/* Popup */
.popup {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

.popup-content {
  background: white;
  padding: 25px;
  border-radius: 20px;
  width: 85%;
  max-width: 350px;
}

.typewriter {
  font-size: 1.1rem;
  line-height: 1.6;
  white-space: pre-wrap;
}

/* Falling hearts */
.falling-heart {
  position: fixed;
  top: -10px;
  font-size: 1.5rem;
  animation: fall 4s linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(110vh);
    opacity: 0;
  }
}
</style>
</head>

<body>

<!-- WHERE IT ALL STARTED -->
<section class="fade-in">
  <h2>Where it all started 😗</h2>
  <img src="WhatsApp Image 2026-01-31 at 20.59.25.jpeg">
  <div class="caption">Where it all started 😗</div>
</section>

<!-- FIRST DATE -->
<section>
  <h2>Our 1st Date 💕</h2>
  <div class="carousel" id="carousel">
    <img src="WhatsApp Image 2026-01-31 at 23.09.48.jpeg" class="active">
    <img src="WhatsApp Image 2026-01-31 at 23.09.48 (1).jpeg">
  </div>
</section>

<!-- PROPOSAL -->
<section>
  <h2>Paushali, will you be my Valentine? 💘</h2>
  <div class="heart" id="heart">❤️</div>

  <div id="timer"></div>
  <div id="heartbeat">💓 Heartbeats together: <span id="beats">0</span></div>

  <div style="position:relative; height:120px;">
    <button id="yesBtn">YES 💖</button>
    <button id="noBtn">NO 🙈</button>
  </div>
</section>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-content">
    <div class="typewriter" id="typeText"></div>
    <br>
    <button id="closePopup">I love you more</button>
  </div>
</div>

<audio id="bgm" src="bgm.mp3" loop></audio>

<script>
/* Carousel auto + swipe */
let index = 0;
const images = document.querySelectorAll('.carousel img');
setInterval(() => {
  images[index].classList.remove('active');
  index = (index + 1) % images.length;
  images[index].classList.add('active');
}, 5000);

/* Stopwatch from Aug 23, 2025 */
const startDate = new Date("2025-08-23T00:00:00");
setInterval(() => {
  const now = new Date();
  let diff = Math.floor((now - startDate) / 1000);
  const days = Math.floor(diff / 86400);
  diff %= 86400;
  const hrs = Math.floor(diff / 3600);
  diff %= 3600;
  const mins = Math.floor(diff / 60);
  const secs = diff % 60;
  timer.innerText = `Together for ${days}d ${hrs}h ${mins}m ${secs}s`;
}, 1000);

/* Heartbeat */
let beats = 0;
setInterval(() => {
  beats++;
  document.getElementById('beats').innerText = beats;
}, 1000);

/* NO button escape */
const noBtn = document.getElementById('noBtn');
noBtn.addEventListener('mouseover', () => {
  noBtn.style.left = Math.random() * 200 + 'px';
  noBtn.style.top = Math.random() * 80 + 'px';
});

/* YES click */
document.getElementById('yesBtn').onclick = () => {
  document.getElementById('heart').innerText = '💛';
  showHearts();
  showPopup();
  document.getElementById('bgm').play();
};

function showHearts() {
  for (let i = 0; i < 25; i++) {
    const h = document.createElement('div');
    h.className = 'falling-heart';
    h.innerText = '💖';
    h.style.left = Math.random() * 100 + 'vw';
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 4000);
  }
}

/* Popup typewriter */
const message = `I can't imagine my life without you.

Thank you for filling my life with so much joy.

You are my favorite person, my home and I’m so glad we get to celebrate this day together.

You're amazing.
Thank you for being mine.

I love youuuuuuuuuuuuuuuuuuu! ❤️`;

function showPopup() {
  popup.style.display = 'flex';
  let i = 0;
  typeText.innerText = '';
  const interval = setInterval(() => {
    typeText.innerText += message[i];
    i++;
    if (i >= message.length) clearInterval(interval);
  }, 40);
}

/* Final message */
closePopup.onclick = () => {
  alert("hope you're ready to go on a cute date with me on the occasion of Valentine's day hehe 💘");
};
</script>

</body>
</html>
